name: Reusable CI for Microservice

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      language:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      gitops_manifest_path:
        required: true
        type: string
      fail_on_lint:
        required: false
        type: boolean
        default: false
      fail_on_security:
        required: false
        type: boolean
        default: false

env:
  SERVICE_NAME: ${{ inputs.service_name }}
  SERVICE_PATH: ${{ inputs.service_path }}
  LANGUAGE: ${{ inputs.language }}
  ECR_REPOSITORY: ${{ inputs.ecr_repository }}
  GITOPS_MANIFEST_PATH: ${{ inputs.gitops_manifest_path }}

jobs:
  build_unit_test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug service path
        run: |
          echo "SERVICE_PATH=${SERVICE_PATH}"
          pwd
          ls -la
          ls -la "${SERVICE_PATH}"

      - name: Install Go dependencies
        if: ${{ inputs.language == 'go' }}
        run: |
          cd "${SERVICE_PATH}"
          pwd
          ls -la
          test -f go.mod || (echo "go.mod não encontrado em $(pwd)" && exit 1)
          go mod download

      - name: Build Go
        if: ${{ inputs.language == 'go' }}
        run: |
          cd "${SERVICE_PATH}"
          go build ./...

      - name: Test Go
        if: ${{ inputs.language == 'go' }}
        run: |
          cd "${SERVICE_PATH}"
          go test ./... -v

      - name: Install Python dependencies
        if: ${{ inputs.language == 'python' }}
        run: |
          cd "${SERVICE_PATH}"
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest

      - name: Test Python
        if: ${{ inputs.language == 'python' }}
        run: |
          cd "${SERVICE_PATH}"
          if [ -d tests ]; then
            pytest -v
          else
            echo "Diretório tests não encontrado. Prosseguindo..."
          fi

  lint_static_analysis:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    needs: build_unit_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run golangci-lint
        if: ${{ inputs.language == 'go' }}
        uses: golangci/golangci-lint-action@v6
        continue-on-error: ${{ !inputs.fail_on_lint }}
        with:
          version: latest
          working-directory: ${{ inputs.service_path }}

      - name: Install Python lint tools
        if: ${{ inputs.language == 'python' }}
        run: |
          cd "${SERVICE_PATH}"
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Run flake8
        if: ${{ inputs.language == 'python' }}
        continue-on-error: ${{ !inputs.fail_on_lint }}
        run: |
          cd "${SERVICE_PATH}"
          flake8 .

      - name: Run pylint
        if: ${{ inputs.language == 'python' }}
        continue-on-error: ${{ !inputs.fail_on_lint }}
        run: |
          cd "${SERVICE_PATH}"
          find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" | xargs -r pylint

  security_scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    needs: lint_static_analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Trivy FS (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service_path }}
          format: table
          severity: CRITICAL
          exit-code: ${{ inputs.fail_on_security && '1' || '0' }}

      - name: Install gosec
        if: ${{ inputs.language == 'go' }}
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run gosec (SAST)
        if: ${{ inputs.language == 'go' }}
        continue-on-error: ${{ !inputs.fail_on_security }}
        run: |
          cd "${SERVICE_PATH}"
          gosec ./...

      - name: Install Bandit
        if: ${{ inputs.language == 'python' }}
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit (SAST)
        if: ${{ inputs.language == 'python' }}
        continue-on-error: ${{ !inputs.fail_on_security }}
        run: |
          cd "${SERVICE_PATH}"
          bandit -r . -ll

  docker_build_scan_push_gitops:
    name: Docker Build, Scan, Push & GitOps Update
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set full image name
        run: |
          echo "FULL_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${ECR_REPOSITORY}:${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t "${ECR_REPOSITORY}:${SHORT_SHA}" "${SERVICE_PATH}"

      - name: Tag local image with full ECR name
        run: docker tag "${ECR_REPOSITORY}:${SHORT_SHA}" "${FULL_IMAGE}"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: table
          severity: CRITICAL
          exit-code: ${{ inputs.fail_on_security && '1' || '0' }}

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${FULL_IMAGE}"

      - name: Checkout GitOps repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Debug GitOps repo
        run: |
          ls -R gitops

      - name: Update image tag in GitOps manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          FILE="gitops/${GITOPS_MANIFEST_PATH}"

          if [ ! -f "${FILE}" ]; then
            echo "Manifesto não encontrado: ${FILE}"
            exit 1
          fi

          sed -i "s|image: .*|image: ${FULL_IMAGE}|g" "${FILE}"

          echo "Manifesto atualizado:"
          cat "${FILE}"

      - name: Commit and push GitOps changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${GITOPS_MANIFEST_PATH}"

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git commit -m "chore(${SERVICE_NAME}): update image to ${SHORT_SHA}"

          git pull --rebase origin main
          git push origin main