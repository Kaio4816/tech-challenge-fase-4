apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: techchallenge
  labels:
    app.kubernetes.io/name: evaluation-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: techchallenge
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: evaluation-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evaluation-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: techchallenge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8004"
    spec:
      containers:
        - name: evaluation-service
          image: 712819938659.dkr.ecr.us-east-1.amazonaws.com/evaluation-service:8799a91
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8004
              protocol: TCP
          env:
            - name: APP_NAME
              value: evaluation-service
            - name: PORT
              value: "8004"
            - name: OTEL_SERVICE_NAME
              value: evaluation-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=techchallenge,deployment.environment=dev"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: REDIS_URL
            - name: FLAG_SERVICE_URL
              value: "http://flag-service.techchallenge.svc.cluster.local:8002"
            - name: TARGETING_SERVICE_URL
              value: "http://targeting-service.techchallenge.svc.cluster.local:8003"
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: SERVICE_API_KEY
            - name: AWS_SQS_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: AWS_SQS_URL
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: AWS_REGION
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            timeoutSeconds: 2
            periodSeconds: 20
            failureThreshold: 3
