apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observability-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: observability-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager.observability.svc.cluster.local:9093"]

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: kubernetes-nodes-cadvisor
        scheme: https
        kubernetes_sd_configs:
          - role: node
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        metrics_path: /metrics/cadvisor
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: service

      - job_name: otel-collector-exported
        static_configs:
          - targets: ["otel-collector.observability.svc.cluster.local:9464"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: observability
data:
  techchallenge-alerts.yaml: |
    groups:
      - name: techchallenge.availability
        rules:
          - alert: TechChallengeTargetDown
            expr: up{namespace="techchallenge"} == 0
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Servico {{ $labels.service }} indisponivel"
              description: "O alvo {{ $labels.pod }} esta fora do scrape do Prometheus ha mais de 2 minutos."

          - alert: TechChallengePodRestarting
            expr: increase(kube_pod_container_status_restarts_total{namespace="techchallenge"}[10m]) > 3
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Pod reiniciando repetidamente"
              description: "O pod {{ $labels.pod }} reiniciou mais de 3 vezes em 10 minutos."

          - alert: TechChallengeHighErrorRate
            expr: |
              (
                sum(rate(http_requests_total{namespace="techchallenge",status=~"5.."}[5m])) by (service)
                or
                sum(rate(flask_http_request_total{namespace="techchallenge",status=~"5.."}[5m])) by (service)
              ) > 0.1
            for: 5m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Alta taxa de erros 5xx em {{ $labels.service }}"
              description: "O servico esta emitindo respostas 5xx acima do limite esperado."

          - alert: TechChallengeAuthHigh5xx
            expr: |
              (
                sum(rate(http_requests_total{namespace="techchallenge",service="auth-service",status=~"5.."}[5m]))
                /
                clamp_min(sum(rate(http_requests_total{namespace="techchallenge",service="auth-service"}[5m])), 1)
              ) > 0.05
            for: 2m
            labels:
              severity: critical
              team: platform
              service: auth-service
              self_heal: "true"
            annotations:
              summary: "Auth-service com taxa de 5xx acima de 5%"
              description: "O auth-service ultrapassou 5% de respostas HTTP 5xx nos ultimos 5 minutos."
              remediation: "rollout restart deployment/auth-service"
              remediation_deployment: "auth-service"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: techchallenge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: techchallenge
      annotations:
        observability.techchallenge/config-version: "prometheus-v2"
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-alert-rules
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: techchallenge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
