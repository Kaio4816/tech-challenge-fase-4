apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: observability
type: Opaque
stringData:
  admin-user: admin
  admin-password: changeme-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.observability.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: techchallenge
        orgId: 1
        folder: ToggleMaster
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-techchallenge-dashboard
  namespace: observability
data:
  techchallenge-overview.json: |
    {
      "uid": "techchallenge-overview",
      "title": "ToggleMaster Observability Overview",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "panels": [
        {
          "type": "stat",
          "title": "Services Up",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "sum(up{namespace=\"techchallenge\"})"}]
        },
        {
          "type": "stat",
          "title": "Pods Running",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "sum(kube_pod_status_phase{namespace=\"techchallenge\",phase=\"Running\"})"}]
        },
        {
          "type": "stat",
          "title": "Restarts 15m",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"techchallenge\"}[15m]))"}]
        },
        {
          "type": "stat",
          "title": "HPA Desired Replicas",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "sum(kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"techchallenge\"})"}]
        },
        {
          "type": "timeseries",
          "title": "Request Rate by Service",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [
            {"expr": "sum by(service) (rate(http_requests_total{namespace=\"techchallenge\"}[5m]))"},
            {"expr": "sum by(service) (rate(flask_http_request_total{namespace=\"techchallenge\"}[5m]))"}
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP 5xx by Service",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [
            {"expr": "sum by(service) (rate(http_requests_total{namespace=\"techchallenge\",status=~\"5..\"}[5m]))"},
            {"expr": "sum by(service) (rate(flask_http_request_total{namespace=\"techchallenge\",status=~\"5..\"}[5m]))"}
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU Usage by Pod",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [{"expr": "sum by(pod) (rate(container_cpu_usage_seconds_total{namespace=\"techchallenge\",container!=\"\"}[5m]))"}]
        },
        {
          "type": "timeseries",
          "title": "Memory Usage by Pod",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [{"expr": "sum by(pod) (container_memory_working_set_bytes{namespace=\"techchallenge\",container!=\"\"})"}]
        },
        {
          "type": "logs",
          "title": "Application Logs - Real Time",
          "gridPos": {"x": 0, "y": 20, "w": 24, "h": 10},
          "targets": [{"expr": "{namespace=\"techchallenge\"}"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: techchallenge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: techchallenge
      annotations:
        observability.techchallenge/config-version: "grafana-v2"
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-techchallenge-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: techchallenge
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
