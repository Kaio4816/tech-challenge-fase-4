apiVersion: v1
kind: Secret
metadata:
  name: incident-integrations-secret
  namespace: observability
type: Opaque
stringData:
  chatops_webhook_url: ""
  pagerduty_routing_key: ""
  opsgenie_api_key: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: chatops-webhook
      group_by: ["alertname", "service", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
      routes:
        - receiver: self-healing-webhook
          matchers:
            - self_heal="true"
          continue: true
        - receiver: pagerduty
          matchers:
            - severity="critical"
          continue: true
        - receiver: opsgenie
          matchers:
            - severity="critical"
          continue: true

    receivers:
      - name: self-healing-webhook
        webhook_configs:
          - url: http://self-healing-webhook.observability.svc.cluster.local:8080/alert
            send_resolved: false

      - name: chatops-webhook
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/chatops_webhook_url
            send_resolved: true

      - name: pagerduty
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/pagerduty_routing_key
            send_resolved: true

      - name: opsgenie
        opsgenie_configs:
          - api_key_file: /etc/alertmanager/secrets/opsgenie_api_key
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: techchallenge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/part-of: techchallenge
      annotations:
        observability.techchallenge/config-version: "alertmanager-v2"
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: 9093
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: secrets
          secret:
            secretName: incident-integrations-secret
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: techchallenge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: http
