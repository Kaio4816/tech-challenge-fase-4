apiVersion: v1
kind: ConfigMap
metadata:
  name: targeting-service-db-bootstrap
  namespace: techchallenge
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS targeting_rules (
        id SERIAL PRIMARY KEY,
        flag_name VARCHAR(100) UNIQUE NOT NULL,
        is_enabled BOOLEAN NOT NULL DEFAULT true,
        rules JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON targeting_rules
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();
---
apiVersion: batch/v1
kind: Job
metadata:
  name: targeting-service-db-bootstrap
  namespace: techchallenge
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: targeting-service-db-bootstrap
        app.kubernetes.io/component: db-bootstrap
        app.kubernetes.io/part-of: techchallenge
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-bootstrap
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: targeting-service-secret
                  key: POSTGRES_DB
          command:
            - sh
            - -ec
          args:
            - |
              export PGPASSWORD="${POSTGRES_PASSWORD}"
              if ! psql "postgresql://${POSTGRES_USER}@${POSTGRES_HOST}:${POSTGRES_PORT}/postgres?sslmode=require" \
                -tAc "SELECT 1 FROM pg_database WHERE datname = '${POSTGRES_DB}'" | grep -q 1; then
                psql "postgresql://${POSTGRES_USER}@${POSTGRES_HOST}:${POSTGRES_PORT}/postgres?sslmode=require" \
                  -v ON_ERROR_STOP=1 \
                  -c "CREATE DATABASE ${POSTGRES_DB}"
              fi
              psql "postgresql://${POSTGRES_USER}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=require" \
                -v ON_ERROR_STOP=1 \
                -f /schema/init.sql
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
      volumes:
        - name: schema
          configMap:
            name: targeting-service-db-bootstrap
